{% extends "base.html" %}
{% block title %}登录{% endblock %}

{% block head_extra %}
<style>
    body { font-family: Arial, sans-serif; margin: 50px; }
    .error { color: red; }
</style>
{% endblock %}

{% block content %}
<h1>文件云盘 - 登录</h1>
<form id="login-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <p><input type="text" name="username" placeholder="用户名" required></p>
    <p><input type="password" name="password" placeholder="密码" required></p>
    <p><button type="submit">登录</button></p>
</form>

<p>如需账号，请联系管理员。</p>
<div id="message"></div>

<script>
    // 登录 JS 原样保留
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        fetch('/login', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                const msg = document.getElementById('message');
                if (data.success) {
                    msg.innerHTML = '<span style="color:green;">登录成功，正在跳转...</span>';
                    setTimeout(() => { location.href = '/'; }, 500);
                } else {
                    msg.innerHTML = '<span class="error">' + data.message + '</span>';
                }
            })
            .catch(err => {
                document.getElementById('message').innerHTML = '<span class="error">网络错误</span>';
            });
    });
</script>
{% endblock %}
