{% extends "base.html" %}
{% block title %}初始化管理员{% endblock %}

{% block head_extra %}
<style>
    body { font-family: Arial, sans-serif; margin: 50px; }
    .error { color: red; }
</style>
{% endblock %}

{% block content %}
<h1>系统初始化 - 注册管理员账户</h1>

<p>首次使用，请创建一个管理员账号。</p>
<form id="init-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <p><input type="text" name="username" placeholder="管理员用户名" required></p>
    <p><input type="password" name="password" placeholder="密码（至少6位）" required></p>
    <p><input type="password" name="confirm" placeholder="确认密码" required></p>
    <p><button type="submit">创建管理员</button></p>
</form>
<div id="message"></div>

<script>
    // 注册 JS 原样保留
    document.getElementById('init-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        fetch('/init', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                const msg = document.getElementById('message');
                if (data.success) {
                    msg.innerHTML = '<span style="color:green;">注册成功，正在跳转...</span>';
                    setTimeout(() => { location.href = '/'; }, 500);
                } else {
                    msg.innerHTML = '<span class="error">' + data.message + '</span>';
                }
            })
            .catch(err => {
                document.getElementById('message').innerHTML = '<span class="error">网络错误</span>';
            });
    });
</script>
{% endblock %}
