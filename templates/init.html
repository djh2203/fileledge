{% extends "base.html" %}
{% block title %}初始化管理员{% endblock %}

{% block head_extra %}
{# 无需额外样式 #}
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="card-title text-center mb-4">系统初始化 - 注册管理员账户</h3>
                    <p class="text-center text-muted">首次使用，请创建一个管理员账号。</p>
                    <form id="init-form">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        <div class="mb-3">
                            <input type="text" class="form-control" name="username" placeholder="管理员用户名" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" name="password" placeholder="密码（至少6位）" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" name="confirm" placeholder="确认密码" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">创建管理员</button>
                    </form>
                    <div id="message" class="mt-2 text-center"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 原有初始化 JS（改为 textContent 更安全）
    document.getElementById('init-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        fetch('/init', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                const msg = document.getElementById('message');
                if (data.success) {
                    msg.textContent = '注册成功，正在跳转...';
                    msg.className = 'text-success';
                    setTimeout(() => { location.href = '/'; }, 500);
                } else {
                    msg.textContent = data.message;
                    msg.className = 'error';
                }
            })
            .catch(err => {
                const msg = document.getElementById('message');
                msg.textContent = '网络错误';
                msg.className = 'error';
            });
    });
</script>
{% endblock %}
